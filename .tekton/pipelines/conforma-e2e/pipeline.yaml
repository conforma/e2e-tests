---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: conforma-e2e-pipeline
spec:
  description: >-
    Provision Kind (AWS), deploy Konflux via operator, run conforma e2e tests,
    collect artifacts, and deprovision.
  params:
    - name: git-url
      type: string
      description: Git URL for conforma/e2e-tests
      default: https://github.com/conforma/e2e-tests.git
    - name: revision
      type: string
      description: Git commit SHA, branch, or tag to test
      default: main
    - name: konflux-ready-timeout
      type: string
      default: "30m"
    - name: oci-container-repo
      type: string
      description: >-
        OCI registry/repo prefix for artifacts (logs/state); PipelineRun name is appended as tag.
    - name: oci-container-repo-credentials-secret
      type: string
      description: >-
        Name of a Secret with registry credentials for oci-container-repo.
    - name: aws-credentials-secret
      type: string
      description: AWS credentials secret name for kind-aws-provision.
      default: mapt-kind-secret
    - name: deprovision-aws-credentials-secret
      type: string
      description: AWS secret for kind-aws-deprovision (often same as provision).
      default: mapt-kind-secret
    - name: konflux-ci-url
      type: string
      default: https://github.com/konflux-ci/konflux-ci.git
    - name: konflux-ci-revision
      type: string
      description: >-
        Pinned commit of konflux-ci for deploy-konflux task.
      default: main
    - name: catalog-url
      type: string
      default: https://github.com/konflux-ci/tekton-integration-catalog.git
    - name: catalog-revision
      type: string
      description: >-
        Pinned commit of tekton-integration-catalog for kind-aws and other catalog tasks.
      # renovate: datasource=git-refs depName=https://github.com/konflux-ci/tekton-integration-catalog
      default: 77224106ecea32f1b0a01c68a8c8c97a70821800

  tasks:
    # ──────────────────────────────────────────────────────────────────────────
    # Infrastructure: provision cluster and deploy Konflux
    # ──────────────────────────────────────────────────────────────────────────
    - name: provision-kind-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.catalog-url)
          - name: revision
            value: $(params.catalog-revision)
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/provision/0.2/kind-aws-provision.yaml
      params:
        - name: secret-aws-credentials
          value: $(params.aws-credentials-secret)
        - name: cluster-access-secret-name
          value: kfg-$(context.pipelineRun.name)
        - name: id
          value: $(context.pipelineRun.name)
        - name: tags
          value: owner=konflux-devprod@redhat.com,project=Konflux,created-by=conforma-e2e-pipeline
        - name: debug
          value: "false"
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
        - name: oci-ref
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: $(params.oci-container-repo-credentials-secret)
        - name: cpus
          value: "16"
        - name: memory
          value: "32"
        - name: spot
          value: "false"
        - name: harden-control-plane
          value: "true"

    - name: deploy-konflux
      runAfter:
        - provision-kind-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.konflux-ci-url)
          - name: revision
            value: $(params.konflux-ci-revision)
          - name: pathInRepo
            value: .tekton/tasks/deploy-konflux/task.yaml
      params:
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: konflux-ready-timeout
          value: $(params.konflux-ready-timeout)
        - name: oci-container-repo
          value: $(params.oci-container-repo)
        - name: oci-container-repo-credentials-secret
          value: $(params.oci-container-repo-credentials-secret)
        - name: pipeline-run-name
          value: $(context.pipelineRun.name)

    # ──────────────────────────────────────────────────────────────────────────
    # E2E tests
    # ──────────────────────────────────────────────────────────────────────────
    - name: conforma-e2e-tests
      timeout: 3h
      runAfter:
        - deploy-konflux
      params:
        - name: git-url
          value: "$(params.git-url)"
        - name: git-revision
          value: "$(params.revision)"
        - name: oras-container
          value: "$(params.oci-container-repo):$(context.pipelineRun.name)"
        - name: cluster-access-secret-name
          value: kfg-$(context.pipelineRun.name)
      taskSpec:
        params:
          - name: git-url
            type: string
          - name: git-revision
            type: string
          - name: oras-container
            type: string
          - name: cluster-access-secret-name
            type: string
        volumes:
          - name: konflux-ci-secrets-volume
            secret:
              secretName: konflux-e2e-secrets
          - name: konflux-infra-secrets-volume
            secret:
              secretName: konflux-test-infra
          - name: cluster-secret-volume
            secret:
              optional: true
              secretName: $(params.cluster-access-secret-name)
        steps:
          - name: e2e-test
            image: registry.access.redhat.com/ubi9/go-toolset:9.7-1768393489
            securityContext:
              runAsUser: 0
            volumeMounts:
              - name: konflux-ci-secrets-volume
                mountPath: /usr/local/konflux-ci-secrets
              - name: konflux-infra-secrets-volume
                mountPath: /usr/local/konflux-test-infra
              - name: cluster-secret-volume
                mountPath: /tmp/kubeconfig
                subPath: kubeconfig
            env:
              - name: KUBECONFIG
                value: /tmp/kubeconfig
              - name: GOTOOLCHAIN
                value: auto
              - name: GOMAXPROCS
                value: "4"
              - name: ARTIFACT_DIR
                value: /tmp/artifact-dir
              - name: GIT_URL
                value: $(params.git-url)
              - name: GIT_REVISION
                value: $(params.git-revision)
              - name: E2E_TIMEOUT
                value: "60m"
              - name: TEST_ENVIRONMENT
                value: "upstream"
            onError: continue
            script: |
              #!/bin/bash
              set -euo pipefail

              # Load and decode secrets
              SECRETS="/usr/local/konflux-ci-secrets"
              if [ -f "${SECRETS}/quay-token" ]; then
                export QUAY_TOKEN="$(cat "${SECRETS}/quay-token")"
              fi

              # Set up a clean working directory
              WORK_DIR="$(mktemp -d)"
              export GOPATH="${WORK_DIR}/go"
              export GOCACHE="${WORK_DIR}/cache"
              mkdir -p "${ARTIFACT_DIR}" "${GOPATH}" "${GOCACHE}"

              # Clone and checkout the conforma/e2e-tests repo
              git clone "${GIT_URL}" "${WORK_DIR}/e2e-tests"
              cd "${WORK_DIR}/e2e-tests"
              git checkout "${GIT_REVISION}"

              # Prepare Go toolchain and Ginkgo
              go mod download
              go install -mod=mod github.com/onsi/ginkgo/v2/ginkgo
              export PATH="${GOPATH}/bin:${PATH}"

              # Run the conforma e2e test suite
              ginkgo -v \
                --no-color \
                --output-interceptor-mode=none \
                --fail-on-empty \
                --timeout="${E2E_TIMEOUT}" \
                --output-dir="${ARTIFACT_DIR}" \
                --junit-report=e2e-report.xml \
                --label-filter="ec" \
                ./cmd
          - name: secure-push-oci
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/secure-push-oci/0.1/secure-push-oci.yaml
            params:
              - name: workdir-path
                value: /tmp/artifact-dir
              - name: oci-ref
                value: $(params.oras-container)
              - name: credentials-volume-name
                value: konflux-infra-secrets-volume
          - name: fail-if-any-step-failed
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/fail-if-any-step-failed/0.1/fail-if-any-step-failed.yaml
    # ──────────────────────────────────────────────────────────────────────────
    # Finally: deprovision
    # ──────────────────────────────────────────────────────────────────────────
  finally:
    - name: deprovision-kind-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: $(params.catalog-url)
          - name: revision
            value: $(params.catalog-revision)
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/deprovision/0.1/kind-aws-deprovision.yaml
      params:
        - name: secret-aws-credentials
          value: $(params.deprovision-aws-credentials-secret)
        - name: id
          value: $(context.pipelineRun.name)
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: oci-container
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: $(params.oci-container-repo-credentials-secret)
